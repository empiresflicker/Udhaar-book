<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e8a020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Udhaar Book">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Udhaar Book</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#e8a020;--green:#27ae60;--red:#e74c3c;--text:#f0f0f0;--muted:#888;--card:#1e1e1e}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}

  #lockScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
  .lock-icon{font-size:60px;margin-bottom:16px}
  .lock-title{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:6px}
  .lock-sub{font-size:13px;color:var(--muted);margin-bottom:30px}
  .lock-input{width:100%;max-width:280px;background:var(--surface2);border:2px solid var(--border);color:var(--text);padding:14px;border-radius:10px;font-size:20px;text-align:center;outline:none;letter-spacing:4px;margin-bottom:14px}
  .lock-input:focus{border-color:var(--accent)}
  .lock-btn{width:100%;max-width:280px;padding:14px;background:var(--accent);border:none;color:#000;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
  .lock-error{color:var(--red);font-size:13px;margin-top:10px;display:none}

  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  header h1{font-size:17px;font-weight:700;color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:10px}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
  .sync-dot.offline{background:var(--red)}
  .undo-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer}
  .undo-btn:hover{border-color:var(--accent);color:var(--accent)}

  .main{max-width:680px;margin:0 auto;padding:14px;padding-bottom:80px}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
  .sum-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .sum-card .amt{font-size:20px;font-weight:700}
  .sum-card.mile .amt{color:var(--red)}
  .sum-card.diye .amt{color:var(--green)}

  .biz-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
  .biz-bar::-webkit-scrollbar{display:none}
  .biz-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap}
  .biz-chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
  .biz-chip.manage{border-style:dashed}

  .tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border)}
  .tab-btn{padding:7px 14px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

  .search-box{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
  .search-box:focus{border-color:var(--accent)}

  .customer-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .customer-card.active{border-color:var(--accent)}
  .customer-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;user-select:none}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
  .cust-info{flex:1}
  .cust-name{font-weight:600;font-size:14px}
  .cust-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .cust-biz{display:inline-block;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);padding:1px 7px;border-radius:10px;margin-top:3px}
  .cust-bal{text-align:right}
  .bal-amt{font-size:15px;font-weight:700}
  .bal-amt.mile{color:var(--red)}
  .bal-amt.diye{color:var(--green)}
  .bal-amt.zero{color:var(--muted)}
  .bal-lbl{font-size:10px;color:var(--muted)}

  .transactions{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
  .customer-card.active .transactions{display:block}
  .tx-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px}
  .tx-title{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase}
  .tx-item{display:flex;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);gap:8px}
  .tx-item:last-child{border-bottom:none}
  .tx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .tx-dot.mile{background:var(--red)}
  .tx-dot.diye{background:var(--green)}
  .tx-detail{flex:1}
  .tx-name{font-size:13px}
  .tx-date{font-size:11px;color:var(--muted);margin-top:2px}
  .tx-receipt{margin-top:6px;max-width:120px;border-radius:6px;cursor:pointer;border:1px solid var(--border)}
  .tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .tx-amt{font-weight:600;font-size:13px}
  .tx-amt.mile{color:var(--red)}
  .tx-amt.diye{color:var(--green)}
  .tx-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1}

  .tx-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .btn-mile{padding:9px;border:none;border-radius:7px;background:var(--red);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
  .btn-diye{padding:9px;border:none;border-radius:7px;background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
  .empty-tx{text-align:center;padding:16px;color:var(--muted);font-size:12px}
  .no-cust{text-align:center;padding:50px 20px;color:var(--muted)}

  .fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));right:22px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 18px rgba(232,160,32,0.5);display:flex;align-items:center;justify-content:center;z-index:200}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:18px 18px 0 0;padding:22px 18px;padding-bottom:calc(36px + env(safe-area-inset-bottom));width:100%;max-width:680px;animation:slideUp 0.22s ease;max-height:90vh;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--accent)}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:8px;font-size:16px;outline:none;font-family:inherit}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
  .form-group select option{background:var(--surface2)}
  .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .type-btn{padding:11px;border:2px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
  .type-btn.mile.sel{border-color:var(--red);color:var(--red);background:rgba(231,76,60,0.1)}
  .type-btn.diye.sel{border-color:var(--green);color:var(--green);background:rgba(39,174,96,0.1)}
  .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
  .btn-cancel{padding:12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:14px;cursor:pointer}
  .btn-save{padding:12px;background:var(--accent);border:none;color:#000;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-del-cust{background:none;border:1px solid var(--red);color:var(--red);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer}

  .photo-preview{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
  .photo-label{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;cursor:pointer;color:var(--muted);font-size:14px}
  .photo-label:hover{border-color:var(--accent);color:var(--accent)}

  .biz-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
  .biz-list-item:last-child{border-bottom:none}
  .biz-del-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer}

  /* Undo modal */
  .undo-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
  .undo-item:last-child{border-bottom:none}
  .undo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .undo-dot.mile{background:var(--red)}
  .undo-dot.diye{background:var(--green)}
  .undo-info{flex:1}
  .undo-name{font-size:13px}
  .undo-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .undo-del{background:none;border:1px solid var(--red);color:var(--red);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer}

  /* Image viewer */
  #imgViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;align-items:center;justify-content:center}
  #imgViewer.open{display:flex}
  #imgViewer img{max-width:95%;max-height:95%;border-radius:8px}
  #imgViewer .close-btn{position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer}

  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">Udhaar Book</div>
  <div class="lock-sub">Password enter karo</div>
  <input class="lock-input" type="tel" id="passInput" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="if(this.value.length===4)checkPass()"/>
  <div class="lock-error" id="passError">❌ Galat password</div>
</div>

<div id="mainApp" style="display:none">
  <header>
    <h1>📒 Udhaar Book</h1>
    <div class="header-right">
      <button class="undo-btn" onclick="openModal('undo')">↩ Undo</button>
      <div><span class="sync-dot" id="syncDot"></span><span id="syncStatus" style="font-size:11px;color:var(--muted)">...</span></div>
    </div>
  </header>

  <div class="main">
    <div class="summary">
      <div class="sum-card mile"><div class="lbl">Aap Ko Mile</div><div class="amt" id="totalMile">Rs. 0</div></div>
      <div class="sum-card diye"><div class="lbl">Aap Ne Diye</div><div class="amt" id="totalDiye">Rs. 0</div></div>
    </div>

    <div class="biz-bar" id="bizBar"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="setFilter('all',this)">Sab</button>
      <button class="tab-btn" onclick="setFilter('mile',this)">Aap Ko Mile</button>
      <button class="tab-btn" onclick="setFilter('diye',this)">Aap Ne Diye</button>
    </div>
    <input class="search-box" type="text" placeholder="🔍 Customer dhundo..." oninput="render()" id="searchBox"/>
    <div id="customerList"><div class="loading"><div class="spinner"></div>Load ho raha hai...</div></div>
  </div>

  <button class="fab" onclick="openModal('add-customer')">+</button>
</div>

<!-- Add Customer -->
<div class="modal-overlay" id="modal-add-customer">
  <div class="modal">
    <div class="modal-title">➕ Naya Customer</div>
    <div class="form-group"><label>Naam</label><input type="text" id="newName" placeholder="Customer ka naam..."/></div>
    <div class="form-group"><label>Phone (Optional)</label><input type="tel" id="newPhone" placeholder="03XX-XXXXXXX"/></div>
    <div class="form-group"><label>Business (Optional)</label><select id="newBiz"><option value="">-- Business select karo --</option></select></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('add-customer')">Cancel</button>
      <button class="btn-save" onclick="addCustomer()">Save</button>
    </div>
  </div>
</div>

<!-- Add Transaction -->
<div class="modal-overlay" id="modal-add-tx">
  <div class="modal">
    <div class="modal-title">💰 Entry Karo</div>
    <input type="hidden" id="txCustId"/>
    <div class="form-group">
      <label>Qism</label>
      <div class="type-toggle">
        <button class="type-btn mile sel" id="btnMile" onclick="pickType('mile')">Aap Ko Mile</button>
        <button class="type-btn diye" id="btnDiye" onclick="pickType('diye')">Aap Ne Diye</button>
      </div>
    </div>
    <div class="form-group"><label>Amount (Rs.)</label><input type="number" id="txAmt" placeholder="0" inputmode="numeric"/></div>
    <div class="form-group"><label>Item / Wajah</label><input type="text" id="txItem" placeholder="Milk, Coke, Kapra..."/></div>
    <div class="form-group">
      <label>Raseed Ki Photo (Optional)</label>
      <label class="photo-label" for="txPhoto">📷 Camera se photo lo</label>
      <input type="file" id="txPhoto" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)"/>
      <img id="photoPreview" class="photo-preview"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('add-tx');clearPhoto()">Cancel</button>
      <button class="btn-save" onclick="addTx()">Save</button>
    </div>
  </div>
</div>

<!-- Manage Businesses -->
<div class="modal-overlay" id="modal-businesses">
  <div class="modal">
    <div class="modal-title">🏢 Businesses</div>
    <div class="form-group" style="display:flex;gap:8px">
      <input type="text" id="newBizName" placeholder="Business ka naam..." style="flex:1"/>
      <button class="btn-save" style="width:auto;padding:11px 16px" onclick="addBusiness()">Add</button>
    </div>
    <div id="bizListManage"></div>
    <div class="modal-actions" style="grid-template-columns:1fr">
      <button class="btn-cancel" onclick="closeModal('businesses')">Done</button>
    </div>
  </div>
</div>

<!-- Undo Modal -->
<div class="modal-overlay" id="modal-undo">
  <div class="modal">
    <div class="modal-title">↩ Last 10 Transactions</div>
    <div id="undoList"></div>
    <div class="modal-actions" style="grid-template-columns:1fr;margin-top:12px">
      <button class="btn-cancel" onclick="closeModal('undo')">Band Karo</button>
    </div>
  </div>
</div>

<!-- Image Viewer -->
<div id="imgViewer">
  <button class="close-btn" onclick="closeImg()">×</button>
  <img id="viewerImg" src=""/>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const PASS='1200';

function checkPass(){
  if(document.getElementById('passInput').value===PASS){
    sessionStorage.setItem('auth','1');
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    initApp();
  } else {
    document.getElementById('passError').style.display='block';
    document.getElementById('passInput').value='';
  }
}

if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

window.openModal=n=>document.getElementById('modal-'+n).classList.add('open');
window.closeModal=n=>document.getElementById('modal-'+n).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));

window.closeImg=()=>document.getElementById('imgViewer').classList.remove('open');
window.viewImg=src=>{document.getElementById('viewerImg').src=src;document.getElementById('imgViewer').classList.add('open');}

let photoBase64='';
window.previewPhoto=function(input){
  const file=input.files[0];
  if(!file)return;
  // Compress image
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      photoBase64=canvas.toDataURL('image/jpeg',0.7);
      const prev=document.getElementById('photoPreview');
      prev.src=photoBase64;prev.style.display='block';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
window.clearPhoto=()=>{photoBase64='';document.getElementById('photoPreview').style.display='none';document.getElementById('txPhoto').value='';};

function initApp(){
  const fc={apiKey:"AIzaSyDr_nh2KkVJtZ2Pw2jXK5ys_gxdRn6WD8o",authDomain:"udhaar-app-da4dc.firebaseapp.com",projectId:"udhaar-app-da4dc",storageBucket:"udhaar-app-da4dc.firebasestorage.app",messagingSenderId:"471472265354",appId:"1:471472265354:web:2a3c2cf0b459c141493573"};
  if(!firebase.apps.length)firebase.initializeApp(fc);
  const db=firebase.firestore();

  let customers=[],transactions=[],businesses=[];
  let activeId=null,currentType='mile',currentFilter='all',currentBiz='all';

  function setOnline(){document.getElementById('syncDot').className='sync-dot';document.getElementById('syncStatus').textContent='Online';}
  function setOffline(){document.getElementById('syncDot').className='sync-dot offline';document.getElementById('syncStatus').textContent='Offline';}

  db.collection('customers').orderBy('createdAt','asc').onSnapshot(s=>{customers=s.docs.map(d=>({id:d.id,...d.data()}));setOnline();render();},setOffline);
  db.collection('transactions').orderBy('createdAt','desc').onSnapshot(s=>{transactions=s.docs.map(d=>({id:d.id,...d.data()}));render();renderUndoList();});
  db.collection('businesses').orderBy('createdAt','asc').onSnapshot(s=>{businesses=s.docs.map(d=>({id:d.id,...d.data()}));renderBizBar();renderBizSelect();renderBizManage();});

  function getBalance(cid){return transactions.filter(t=>t.custId===cid).reduce((s,t)=>s+(t.type==='mile'?t.amount:-t.amount),0);}

  function fmtDT(ts){
    if(!ts)return '';
    const d=ts.toDate?ts.toDate():new Date(ts);
    return d.toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit',hour12:true});
  }

  function renderBizBar(){
    document.getElementById('bizBar').innerHTML=
      `<div class="biz-chip ${currentBiz==='all'?'active':''}" onclick="setBiz('all')">Sab</div>`+
      businesses.map(b=>`<div class="biz-chip ${currentBiz===b.id?'active':''}" onclick="setBiz('${b.id}')">${b.name}</div>`).join('')+
      `<div class="biz-chip manage" onclick="openModal('businesses')">⚙️ Businesses</div>`;
  }

  function renderBizSelect(){
    document.getElementById('newBiz').innerHTML='<option value="">-- Business select karo --</option>'+
      businesses.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  }

  function renderBizManage(){
    const el=document.getElementById('bizListManage');
    if(!businesses.length){el.innerHTML='<div class="empty-tx">Koi business nahi</div>';return;}
    el.innerHTML=businesses.map(b=>`
      <div class="biz-list-item">
        <span>${b.name}</span>
        <button class="biz-del-btn" onclick="delBusiness('${b.id}')">×</button>
      </div>`).join('');
  }

  function renderUndoList(){
    const last10=transactions.slice(0,10);
    const el=document.getElementById('undoList');
    if(!last10.length){el.innerHTML='<div class="empty-tx">Koi transaction nahi</div>';return;}
    el.innerHTML=last10.map(t=>{
      const cust=customers.find(c=>c.id===t.custId);
      return `<div class="undo-item">
        <div class="undo-dot ${t.type}"></div>
        <div class="undo-info">
          <div class="undo-name">${cust?.name||'?'} — Rs. ${Number(t.amount).toLocaleString()}</div>
          <div class="undo-meta">${t.item||''} · ${fmtDT(t.createdAt)}</div>
        </div>
        <button class="undo-del" onclick="undoTx('${t.id}')">Hata do</button>
      </div>`;
    }).join('');
  }

  window.setBiz=id=>{currentBiz=id;renderBizBar();render();};
  window.addBusiness=()=>{const n=document.getElementById('newBizName').value.trim();if(!n)return;db.collection('businesses').add({name:n,createdAt:firebase.firestore.FieldValue.serverTimestamp()});document.getElementById('newBizName').value='';};
  window.delBusiness=id=>{if(!confirm('Delete karo?'))return;db.collection('businesses').doc(id).delete();};

  function render(){
    const search=document.getElementById('searchBox').value.toLowerCase();
    let list=customers.filter(c=>c.name.toLowerCase().includes(search));
    if(currentBiz!=='all')list=list.filter(c=>c.bizId===currentBiz);
    if(currentFilter==='mile')list=list.filter(c=>getBalance(c.id)>0);
    if(currentFilter==='diye')list=list.filter(c=>getBalance(c.id)<0);

    let tM=0,tD=0;
    customers.forEach(c=>{const b=getBalance(c.id);if(b>0)tM+=b;else tD+=Math.abs(b);});
    document.getElementById('totalMile').textContent='Rs. '+tM.toLocaleString();
    document.getElementById('totalDiye').textContent='Rs. '+tD.toLocaleString();

    if(!list.length){document.getElementById('customerList').innerHTML='<div class="no-cust"><p>Koi customer nahi</p><small>+ se add karo</small></div>';return;}

    document.getElementById('customerList').innerHTML=list.map(c=>{
      const bal=getBalance(c.id);
      const bc=bal>0?'mile':bal<0?'diye':'zero';
      const bl=bal>0?'Aap Ko Mile':bal<0?'Aap Ne Diye':'Barabar';
      const cTx=transactions.filter(t=>t.custId===c.id);
      const bizName=businesses.find(b=>b.id===c.bizId)?.name||'';

      const txHtml=cTx.length?cTx.map(t=>`
        <div class="tx-item">
          <div class="tx-dot ${t.type}"></div>
          <div class="tx-detail">
            <div class="tx-name">${t.item||'Entry'}</div>
            <div class="tx-date">${fmtDT(t.createdAt)}</div>
            ${t.photo?`<img class="tx-receipt" src="${t.photo}" onclick="viewImg('${t.photo}')" />`:''}
          </div>
          <div class="tx-right">
            <div class="tx-amt ${t.type}">${t.type==='mile'?'+':'-'}Rs. ${Number(t.amount).toLocaleString()}</div>
            <button class="tx-del" onclick="delTx('${t.id}',event)">×</button>
          </div>
        </div>`).join(''):'<div class="empty-tx">Koi entry nahi</div>';

      return `<div class="customer-card ${activeId===c.id?'active':''}" id="card-${c.id}">
        <div class="customer-header" onclick="toggleCust('${c.id}')">
          <div class="avatar">${c.name.charAt(0).toUpperCase()}</div>
          <div class="cust-info">
            <div class="cust-name">${c.name}</div>
            <div class="cust-meta">${c.phone||''} · ${cTx.length} entry</div>
            ${bizName?`<span class="cust-biz">${bizName}</span>`:''}
          </div>
          <div class="cust-bal">
            <div class="bal-amt ${bc}">Rs. ${Math.abs(bal).toLocaleString()}</div>
            <div class="bal-lbl">${bl}</div>
          </div>
        </div>
        <div class="transactions">
          <div class="tx-hdr"><span class="tx-title">Transactions</span><button class="btn-del-cust" onclick="delCust('${c.id}',event)">🗑 Delete</button></div>
          <div>${txHtml}</div>
          <div class="tx-actions">
            <button class="btn-mile" onclick="openTx('${c.id}','mile')">+ Aap Ko Mile</button>
            <button class="btn-diye" onclick="openTx('${c.id}','diye')">+ Aap Ne Diye</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.toggleCust=id=>{activeId=activeId===id?null:id;render();if(activeId)setTimeout(()=>document.getElementById('card-'+id)?.scrollIntoView({behavior:'smooth',block:'start'}),50);};

  window.addCustomer=()=>{
    const n=document.getElementById('newName').value.trim();
    if(!n){alert('Naam likho');return;}
    db.collection('customers').add({name:n,phone:document.getElementById('newPhone').value.trim(),bizId:document.getElementById('newBiz').value||'',createdAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(()=>{document.getElementById('newName').value='';document.getElementById('newPhone').value='';document.getElementById('newBiz').value='';closeModal('add-customer');});
  };

  window.delCust=(id,e)=>{e.stopPropagation();if(!confirm('Delete karo?'))return;db.collection('customers').doc(id).delete();transactions.filter(t=>t.custId===id).forEach(t=>db.collection('transactions').doc(t.id).delete());if(activeId===id)activeId=null;};

  window.openTx=(cid,type)=>{document.getElementById('txCustId').value=cid;pickType(type);document.getElementById('txAmt').value='';document.getElementById('txItem').value='';clearPhoto();openModal('add-tx');};

  window.pickType=type=>{currentType=type;document.getElementById('btnMile').className='type-btn mile'+(type==='mile'?' sel':'');document.getElementById('btnDiye').className='type-btn diye'+(type==='diye'?' sel':'');};

  window.addTx=()=>{
    const a=parseFloat(document.getElementById('txAmt').value);
    if(!a||a<=0){alert('Amount likho');return;}
    const btn=document.querySelector('#modal-add-tx .btn-save');
    btn.textContent='Saving...';btn.disabled=true;
    db.collection('transactions').add({
      custId:document.getElementById('txCustId').value,
      type:currentType,amount:a,
      item:document.getElementById('txItem').value.trim(),
      photo:photoBase64||'',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{closeModal('add-tx');clearPhoto();btn.textContent='Save';btn.disabled=false;});
  };

  window.delTx=(id,e)=>{e.stopPropagation();if(!confirm('Delete karo?'))return;db.collection('transactions').doc(id).delete();};
  window.undoTx=id=>{if(!confirm('Yeh transaction hata do?'))return;db.collection('transactions').doc(id).delete();};
  window.setFilter=(f,btn)=>{currentFilter=f;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();};
}

if(sessionStorage.getItem('auth')==='1')initApp();
</script>
</body>
</html>
